name: ChatWork通知

on:
  push:
    paths:
      - 'data/grants/*.md'
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 差分検出のため直前コミットも取得

      - name: 変更されたgrantsファイルを特定
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'data/grants/*.md' | grep -v '.gitkeep' || true)
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Python セットアップ
        if: steps.changed.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存インストール
        if: steps.changed.outputs.skip == 'false'
        run: pip install -r scripts/requirements.txt

      - name: ChatWork に投稿
        if: steps.changed.outputs.skip == 'false'
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          echo "$CHANGED_FILES" | while read -r file; do
            python scripts/notify_chatwork.py "$file"
          done
